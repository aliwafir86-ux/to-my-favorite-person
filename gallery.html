<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Gallery 🧡</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffaf0;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff7f50;
            margin-bottom: 10px;
            animation: fadeIn 1.5s ease-in;
        }

        .subtitle {
            margin-bottom: 30px;
            font-style: italic;
            opacity: 0.8;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            padding: 10px;
        }

        .gallery-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .gallery-item:hover {
            transform: translateY(-10px) rotate(2deg);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .gallery-item p {
            font-size: 0.9rem;
            color: #ff7f50;
            font-weight: bold;
        }

        .button-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            display: inline-block;
        }

        .back-btn {
            background-color: #4a4a4a;
            color: white;
        }

        .love-btn {
            background-color: #ff7f50;
            color: white;
            box-shadow: 0 4px 15px rgba(255,127,80, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <h1>Our Memories 🧡</h1>
    <p class="subtitle">Every picture tells a story of us...</p>

    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="foto7.jpg" alt="Memory 1">
            <p>The Beginning ✨</p>
        </div>

        <div class="gallery-item">
            <img src="foto8.jpg" alt="Memory 2">
            <p>Your Beautiful Smile 😊</p>
        </div>

        <div class="gallery-item">
            <img src="foto9.jpg" alt="Memory 3">
            <p>Best Date Ever! 🍕</p>
        </div>

        <div class="gallery-item">
            <img src="foto10.jpg" alt="Memory 4">
            <p>Just You & Me 🧡</p>
        </div>
        </div>
        <div class="gallery-item">
            <img src="foto11.jpg" alt="Memory 5">
            <p>beatiful 🧡</p>
        </div>
        </div>
        <div class="gallery-item">
            <img src="foto12.jpg" alt="Memory 6">
            <p> 🧡</p>
        </div>
    </div>

    <div class="button-group">
        <a href="index.html" class="btn back-btn">⬅ Back to Home</a>
        <button class="btn love-btn" onclick="sayLove()">I Love You More 🧡</button>
    </div>

    <script>
        const audio = document.getElementById('myAudio');

        // FUNGSI MUSIK NYAMBUNG
        window.addEventListener('load', () => {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) {
                audio.currentTime = savedTime;
            }
            audio.play().catch(() => {
                console.log("Klik di mana saja untuk memutar musik jika tertahan browser.");
            });
        });

        // Simpan waktu musik setiap detik agar sinkron saat pindah halaman
        setInterval(() => {
            localStorage.setItem('audioTime', audio.currentTime);
        }, 1000);

        function sayLove() {
            alert("I Love You More Than Anything, Mujayyanah! 🧡✨");
        }
    </script>

</body>
</html>
